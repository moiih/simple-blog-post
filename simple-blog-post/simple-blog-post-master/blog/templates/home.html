<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <title>
        {% block title %} Home {% endblock %}
    </title>

    <style>

        .elements {
            color: blue;
            margin-left: 100px;
        }

        strong {
            color: red;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
          }
          
          .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
          }
          
          .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
          }
          
          .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
          }
          
          input:checked + .slider {
            background-color: #2196F3;
          }
          
          input:focus + .slider {
            box-shadow: 0 0 1px #2196F3;
          }
          
          input:checked + .slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
          }
          
          /* Rounded sliders */
          .slider.round {
            border-radius: 34px;
          }
          
          .slider.round:before {
            border-radius: 50%;
          }

    </style>

</head>

<body>
    
    <h1> Hello
    
    {% if user.is_authenticated %}
        {{ user }}
    {% endif %} ! </h1>

      
    <center>
        {% if user.is_authenticated %}
            <a class="btn  btn-outline-success" href="{% url 'home' %}"> Home </a> &nbsp;
            <a class="btn btn-danger" href="{% url 'logout' %}"> Logout </a> &nbsp;
            <a class="btn btn-warning" href="{% url 'write_blog' %}"> Post Blog </a> &nbsp;
            <a class="btn btn-info" href="{% url 'user_posts' %}"> Show Posts </a>    
            <br>        

        {% else %}
            <a class="btn btn-primary" href="{% url 'login' %}"> Login </a> &nbsp; 
            <a class="btn btn-success" href="{% url 'register' %}"> Register </a>
            <br> <br>            
        {% endif %}
    </center>


    {% block main %}  {% endblock main %}

</body>

</html>
